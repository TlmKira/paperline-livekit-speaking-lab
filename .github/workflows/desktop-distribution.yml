name: Desktop Distribution

on:
  push:
    tags:
      - "v*"
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to build, for example v0.1.2 or desktop-v0.1.2"
        required: true
        type: string
      release_ref:
        description: "Git ref to build from"
        required: false
        default: "main"
        type: string

permissions:
  contents: write

jobs:
  build-desktop-macos:
    runs-on: macos-14
    env:
      CADENCE_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build signed desktop release
        working-directory: desktop
        run: pnpm build:release

      - name: Archive desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cadence-desktop-${{ env.CADENCE_RELEASE_TAG }}
          path: |
            desktop/packages/*.dmg
            desktop/packages/*.dmg.blockmap
          if-no-files-found: error

      - name: Publish GitHub release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${CADENCE_RELEASE_TAG}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" desktop/packages/*.dmg desktop/packages/*.dmg.blockmap --clobber
          else
            gh release create "$tag" desktop/packages/*.dmg desktop/packages/*.dmg.blockmap --generate-notes --target "$GITHUB_SHA"
          fi
