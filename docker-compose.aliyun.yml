services:
  web:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/tlmkira/paperline-livekit-speaking-lab}/web:${GHCR_IMAGE_TAG:-latest}
    env_file:
      - .env.local
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://127.0.0.1:54321}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-dummy-local-key}
      NEXT_PUBLIC_BRANDFETCH_CLIENT_ID: ${NEXT_PUBLIC_BRANDFETCH_CLIENT_ID:-dummy-local-client}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      ALIYUN_COACH_MODEL: ${ALIYUN_COACH_MODEL:-qwen-plus}
      ALIYUN_JUST_SPEAK_MODEL: ${ALIYUN_JUST_SPEAK_MODEL:-qwen-plus}
      ALIYUN_ASR_MODEL: ${ALIYUN_ASR_MODEL:-qwen3.5-omni-flash}
      ALIYUN_ASSESSMENT_MODEL: ${ALIYUN_ASSESSMENT_MODEL:-qwen3.5-omni-flash}
      ALIYUN_TTS_MODEL: ${ALIYUN_TTS_MODEL:-cosyvoice-v3-flash}
      ALIYUN_TTS_VOICE: ${ALIYUN_TTS_VOICE:-loongabby_v3}
      ALIYUN_SPEECH_ASSESS_APPKEY: ${ALIYUN_SPEECH_ASSESS_APPKEY:-}
      ALIYUN_SPEECH_ASSESS_USER_ID: ${ALIYUN_SPEECH_ASSESS_USER_ID:-paperline-local-user}
      ALIYUN_SPEECH_ASSESS_WARRANT_URL: ${ALIYUN_SPEECH_ASSESS_WARRANT_URL:-}
      ALIYUN_SPEECH_ASSESS_WARRANT_ID: ${ALIYUN_SPEECH_ASSESS_WARRANT_ID:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_dummy_local_key}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-price_dummy_local}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_dummy_local}
      BREVO_SMTP_HOST: ${BREVO_SMTP_HOST:-}
      BREVO_SMTP_PORT: ${BREVO_SMTP_PORT:-}
      BREVO_SMTP_USER: ${BREVO_SMTP_USER:-}
      BREVO_SMTP_PASSWORD: ${BREVO_SMTP_PASSWORD:-}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
    ports:
      - "3000:3000"
    volumes:
      - ./public/sdk:/app/public/sdk:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((res)=>{if(!res.ok) process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
