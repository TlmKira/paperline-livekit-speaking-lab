name: cadence
description: AI-powered pronunciation and accent training
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Auth & backend
  supabase_flutter: ^2.5.0
  dio: ^5.4.3+1

  # State management & navigation
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0

  # Fonts & UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  lucide_flutter: ^0.257.0+1

  # Audio
  record: ^5.1.2
  just_audio: ^0.9.39
  path_provider: ^2.1.3
  permission_handler: ^11.3.1

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo/
    - assets/images/illustrations/
    - assets/sounds/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo/icon.png"
