services:
  web:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/tlmkira/paperline-livekit-speaking-lab}/web:${GHCR_IMAGE_TAG:-latest}
    env_file:
      - .env.local
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://127.0.0.1:54321}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-dummy-local-key}
      NEXT_PUBLIC_BRANDFETCH_CLIENT_ID: ${NEXT_PUBLIC_BRANDFETCH_CLIENT_ID:-dummy-local-client}
      AI_ENGINE_URL: http://ai-engine:8000
      AI_COACH_ENGINE_URL: http://coach-engine:8001
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_dummy_local_key}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-price_dummy_local}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_dummy_local}
      BREVO_SMTP_HOST: ${BREVO_SMTP_HOST:-}
      BREVO_SMTP_PORT: ${BREVO_SMTP_PORT:-}
      BREVO_SMTP_USER: ${BREVO_SMTP_USER:-}
      BREVO_SMTP_PASSWORD: ${BREVO_SMTP_PASSWORD:-}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
    depends_on:
      ai-engine:
        condition: service_started
      coach-engine:
        condition: service_started
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((res)=>{if(!res.ok) process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  ai-engine:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/tlmkira/paperline-livekit-speaking-lab}/ai-engine:${GHCR_IMAGE_TAG:-latest}
    env_file:
      - .env.local
    environment:
      AI_ENGINE_HOST: 0.0.0.0
      AI_ENGINE_PORT: 8000
      HF_HOME: /models/huggingface
      TRANSFORMERS_CACHE: /models/huggingface
      CADENCE_LOG_LEVEL: ${CADENCE_LOG_LEVEL:-INFO}
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - ./src/backend/data:/data:ro
      - hf-cache:/models/huggingface
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  coach-engine:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/tlmkira/paperline-livekit-speaking-lab}/coach-engine:${GHCR_IMAGE_TAG:-latest}
    env_file:
      - .env.local
    environment:
      COACH_ENGINE_HOST: 0.0.0.0
      COACH_ENGINE_PORT: 8001
      COACH_LLM_MODEL_ID: ${COACH_LLM_MODEL_ID:-Qwen/Qwen2.5-3B-Instruct}
      COACH_LLM_DEVICE: ${COACH_LLM_DEVICE:-cpu}
      HF_HOME: /models/huggingface
      TRANSFORMERS_CACHE: /models/huggingface
      CADENCE_LOG_LEVEL: ${CADENCE_LOG_LEVEL:-INFO}
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - hf-cache:/models/huggingface
    expose:
      - "8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  hf-cache:
